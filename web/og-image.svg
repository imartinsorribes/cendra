<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <!-- Fondo degradado brasa -->
  <defs>
    <linearGradient id="brasaFondo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbf8f3"/>
      <stop offset="100%" stop-color="#f1eadd"/>
    </linearGradient>
    <linearGradient id="brasaBarra" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6e9d4c"/>
      <stop offset="35%" stop-color="#f5b400"/>
      <stop offset="70%" stop-color="#e57a37"/>
      <stop offset="100%" stop-color="#b03a1d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#brasaFondo)"/>

  <!-- Banda superior brasa -->
  <rect x="0" y="0" width="1200" height="14" fill="url(#brasaBarra)"/>

  <!-- Logo: triángulo brasa -->
  <g transform="translate(70, 80)">
    <rect x="0" y="0" width="100" height="100" rx="22" fill="#fbf8f3" stroke="#e8e1d1" stroke-width="2"/>
    <polygon points="50,18 80,72 20,72" fill="#b03a1d"/>
    <polygon points="50,40 66,64 34,64" fill="#fbf8f3"/>
  </g>

  <!-- Wordmark -->
  <text x="200" y="142" font-size="58" font-weight="800" fill="#1c1b16" letter-spacing="-2">cendra</text>
  <text x="200" y="178" font-size="22" font-weight="500" fill="#5a564b">atlas paramétrico de riesgo de incendio · València</text>

  <!-- Pregunta gancho -->
  <text x="70" y="280" font-size="56" font-weight="700" fill="#1c1b16" letter-spacing="-1.5">¿Cuál es el riesgo de incendio</text>
  <text x="70" y="350" font-size="56" font-weight="700" fill="#1c1b16" letter-spacing="-1.5">de tu edificio?</text>

  <!-- Tres cifras grandes -->
  <g transform="translate(70, 430)">
    <!-- Cifra 1 -->
    <text x="0" y="0" font-size="68" font-weight="800" fill="#b03a1d" letter-spacing="-2">36.300</text>
    <text x="0" y="38" font-size="18" font-weight="500" fill="#5a564b">edificios analizados</text>

    <!-- Cifra 2 -->
    <text x="370" y="0" font-size="68" font-weight="800" fill="#b03a1d" letter-spacing="-2">154</text>
    <text x="370" y="38" font-size="18" font-weight="500" fill="#5a564b">candidatos perfil Campanar</text>

    <!-- Cifra 3 -->
    <text x="700" y="0" font-size="68" font-weight="800" fill="#b03a1d" letter-spacing="-2">100 %</text>
    <text x="700" y="38" font-size="18" font-weight="500" fill="#5a564b">datos abiertos</text>
  </g>

  <!-- Pie con URL -->
  <text x="70" y="595" font-size="22" font-weight="600" fill="#5a564b" letter-spacing="0.3">cendra.pages.dev</text>
  <text x="1130" y="595" font-size="14" font-weight="500" fill="#928d80" text-anchor="end">datos del Ajuntament de València · Catastro INSPIRE · CC BY 4.0</text>

  <!-- Banda inferior brasa -->
  <rect x="0" y="616" width="1200" height="14" fill="url(#brasaBarra)"/>
</svg>
